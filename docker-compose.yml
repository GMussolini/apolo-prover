services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: apolo
      POSTGRES_USER: apolo
      POSTGRES_PASSWORD: apolo
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apolo"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: prod
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data/logs:/app/data/logs
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
    restart: unless-stopped
