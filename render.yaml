# Render Blueprint - APOLO Prover (somente a API; frontend vai no Vercel)
#
# IMPORTANTE - antes do primeiro deploy:
#   1) No painel Render, preencha APOLO_CONFIG_JSON com o JSON completo da config
#      (mesmo formato do config.example.json). Inclua chaves API NOVAS (as
#      antigas precisam ser revogadas) e a senha do SQL Server (tambem rotacionada).
#   2) Libere o firewall do Azure SQL para 0.0.0.0/0 TEMPORARIAMENTE (POC).
#      Ideal: dropar Render starter e usar IPs estaticos.
#   3) Postgres: crie um projeto gratis em https://neon.tech, copie a
#      connection string e cole dentro do APOLO_CONFIG_JSON em "postgres_conn".
#      Importante: usar sslmode=require na URL do Neon.
#   4) "cors_origins" dentro do APOLO_CONFIG_JSON deve incluir a URL do Vercel
#      (ex.: ["https://apolo-prover.vercel.app","http://localhost:3000"]).

services:
  - type: web
    name: apolo-prover-api
    runtime: docker
    repo: https://github.com/GMussolini/apolo-prover
    branch: main
    rootDir: apps/api
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      # Config completa em UMA env var (JSON cru). O backend ja sabe ler
      # APOLO_CONFIG_JSON (ver apps/api/app/core/config.py:get_config).
      - key: APOLO_CONFIG_JSON
        sync: false
      # Alternativa: mesmo JSON em base64. Use UM ou OUTRO, nao os dois.
      - key: APOLO_CONFIG_B64
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
