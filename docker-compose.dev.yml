services:
  api:
    build:
      target: dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./apps/api/app:/app/app
      - ./config.json:/app/config.json:ro
      - ./data/logs:/app/data/logs

  web:
    command: npm run dev
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
